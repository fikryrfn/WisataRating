<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WisataRating</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-green-700 text-white py-6 px-4 text-center">
    <h1 class="text-3xl font-bold">🌿 WisataRating</h1>
    <p class="text-green-100 mt-1 text-sm">Temukan destinasi wisata terbaik Indonesia</p>
  </header>

  <!-- Search & Filter -->
  <div class="max-w-5xl mx-auto px-4 py-6">
    <input id="searchInput" type="text" placeholder="Cari destinasi wisata..."
      oninput="filterCards()"
      class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-green-500" />

    <div class="flex flex-wrap gap-2 mb-6">
      <button class="filter-btn bg-green-700 text-white border border-green-700 text-sm px-4 py-1.5 rounded-full"
        onclick="setFilter(this, 'Semua')">Semua</button>
      <button class="filter-btn border border-gray-300 text-gray-600 text-sm px-4 py-1.5 rounded-full"
        onclick="setFilter(this, 'Pantai')">Pantai</button>
      <button class="filter-btn border border-gray-300 text-gray-600 text-sm px-4 py-1.5 rounded-full"
        onclick="setFilter(this, 'Gunung')">Gunung</button>
      <button class="filter-btn border border-gray-300 text-gray-600 text-sm px-4 py-1.5 rounded-full"
        onclick="setFilter(this, 'Budaya')">Budaya</button>
      <button class="filter-btn border border-gray-300 text-gray-600 text-sm px-4 py-1.5 rounded-full"
        onclick="setFilter(this, 'Air Terjun')">Air Terjun</button>
    </div>

    <!-- Cards Grid -->
    <div id="cards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <p id="no-result" class="hidden text-center text-gray-400 mt-10">Tidak ada hasil ditemukan.</p>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
